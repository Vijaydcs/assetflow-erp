spring:
  application:
    name: assetflow-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/assetflow}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
server:
  port: ${PORT:8080}
